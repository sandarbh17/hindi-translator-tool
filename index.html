<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Hindi Translator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Noto+Sans+Devanagari&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
@media print {
  body {
    margin: 0;
    padding: 0;
    background: white;
  }

  .container {
    margin: 0 !important;
    box-shadow: none !important;
    border-radius: 0 !important;
  }
}
body {
  margin:0;
  font-family:'Poppins', sans-serif;
  background: linear-gradient(135deg,#667eea,#764ba2);
}

.container {
  max-width:900px;
  margin:40px auto;
  background:white;
  border-radius:16px;
  padding:30px;
  box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

h2 {
  text-align:center;
  margin-bottom:20px;
}

label {
  font-weight:500;
  margin-top:15px;
  display:block;
}

input, textarea {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-top:8px;
  font-size:15px;
  transition:0.3s;
}

input:focus, textarea:focus {
  border-color:#667eea;
  outline:none;
  box-shadow:0 0 5px rgba(102,126,234,0.5);
}

textarea {
  min-height:90px;
}

.top-bar {
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

select {
  padding:8px;
  border-radius:8px;
}

.buttons {
  text-align:center;
  margin-top:20px;
}

button {
  padding:10px 20px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#667eea;
  color:white;
  cursor:pointer;
}

button:hover {
  background:#5a67d8;
}

.status {
  text-align:center;
  margin-top:10px;
  font-size:13px;
  color:#666;
}
</style>
</head>

<body>

<div class="container" id="pdfContent">

<h2>🌐 Smart Hindi Translator</h2>

<div class="top-bar">
  <div>
    Mode:
    <select id="mode">
      <option value="translit">Typing (Hinglish → हिन्दी)</option>
      <option value="translate">Translate (English → Hindi)</option>
    </select>
  </div>

  <div>
    Language:
    <select id="lang">
      <option value="hi">Hindi</option>
      <option value="mr">Marathi</option>
      <option value="bn">Bengali</option>
    </select>
  </div>
</div>

<form>

<label>Name</label>
<input type="text" class="field">

<label>Address</label>
<textarea class="field"></textarea>

<label>City</label>
<input type="text" class="field">

<label>Phone</label>
<input type="tel">

<label>Email</label>
<input type="email">

<label>Remarks</label>
<textarea class="field"></textarea>

</form>

<div class="status" id="status">Ready</div>

</div>

<div class="buttons">
<button onclick="downloadPDF()">Download PDF</button>
<button onclick="copyText()">Copy</button>
<button onclick="clearForm()">Clear</button>
</div>

<script>
const fields = document.querySelectorAll('.field');
let debounceTimer;

// 🔁 TRANSLITERATION (on space)
fields.forEach(field => {
  field.addEventListener('keydown', async (e) => {

    if (e.key === " ") {

      const mode = document.getElementById("mode").value;
      if (mode !== "translit") return;

      let cursorPos = field.selectionStart;
      let text = field.value;

      let beforeCursor = text.substring(0, cursorPos);
      let afterCursor = text.substring(cursorPos);

      let words = beforeCursor.split(" ");
      let lastWord = words[words.length - 1];

      if (!lastWord.trim()) return;

      e.preventDefault();

      try {
        const res = await fetch(
          `https://inputtools.google.com/request?text=${encodeURIComponent(lastWord)}&itc=hi-t-i0-und&num=1`
        );

        const data = await res.json();

        if (data[0] === "SUCCESS") {
          let hindi = data[1][0][1][0];
          words[words.length - 1] = hindi;

          let newText = words.join(" ") + " " + afterCursor;
          field.value = newText;

          let pos = (words.join(" ") + " ").length;
          field.setSelectionRange(pos, pos);
        }

      } catch (err) {
        console.error(err);
      }
    }
  });
});


// 🌍 TRANSLATION (English → Hindi)
fields.forEach(field => {

  field.addEventListener('input', () => {

    const mode = document.getElementById("mode").value;

    if (mode !== "translate") return;

    clearTimeout(debounceTimer);

    debounceTimer = setTimeout(async () => {

      const text = field.value.trim();
      if (!text) return;

      document.getElementById("status").innerText = "Translating...";

      try {
        const res = await fetch(
          `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=hi&dt=t&q=${encodeURIComponent(text)}`
        );

        const data = await res.json();
        const translated = data[0].map(x => x[0]).join('');

        field.value = translated;

        document.getElementById("status").innerText = "Done ✔";

      } catch (err) {
        console.error(err);
        document.getElementById("status").innerText = "Error ❌";
      }

    }, 700); // debounce
  });

});

// 📄 DOWNLOAD PDF (FIXED)
function downloadPDF() {
  const element = document.getElementById("pdfContent");

  const status = document.getElementById("status");
  status.innerText = "Generating PDF...";

  // Temporarily fix layout
  const originalStyle = element.style.cssText;

  element.style.margin = "0";
  element.style.padding = "20px";
  element.style.boxShadow = "none";
  element.style.background = "white";

  setTimeout(() => {
    html2pdf().set({
      margin: 0,
      filename: 'hindi_form.pdf',
      html2canvas: {
        scale: 2,
        useCORS: true,
        scrollY: 0
      },
      jsPDF: {
        unit: 'pt',
        format: 'a4',
        orientation: 'portrait'
      }
    }).from(element).save().then(() => {

      // Restore original styles
      element.style.cssText = originalStyle;
      status.innerText = "PDF Downloaded ✔";

    });

  }, 300);
}


// 📋 COPY ALL (FIXED)
function copyText() {
  let text = "";

  document.querySelectorAll("#pdfContent input, #pdfContent textarea").forEach(el => {
    if (el.value.trim()) {
      text += el.value + "\n";
    }
  });

  if (!text) {
    alert("Nothing to copy!");
    return;
  }

  navigator.clipboard.writeText(text)
    .then(() => {
      document.getElementById("status").innerText = "Copied ✔";
    })
    .catch(() => {
      alert("Copy failed. Try again.");
    });
}


// 🧹 CLEAR FORM (FIXED)
function clearForm() {
  document.querySelectorAll("#pdfContent input, #pdfContent textarea").forEach(el => {
    el.value = "";
  });

  document.getElementById("status").innerText = "Cleared ✔";
}

</script>
